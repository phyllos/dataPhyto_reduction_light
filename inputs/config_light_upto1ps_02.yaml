## config_light_upto1ps.yaml
## Full light-data pipeline: C1 -> C13

project_root: .
functions_dir: ./Functions_python

start_from: C1

data_name: upto1ps
stream: ./inputs/upto1ps.stream
params: ./inputs/upto1ps.params
delays: ./inputs/delays_original.mat
output: ./outputs/upto1ps_test02

## Unit cell from the stream header, in Angstrom
## a = 54.22 A, b = 115.78 A, c = 117.08 A
a: 54.22
b: 115.78
c: 117.08

## Photon energy around 7025 eV -> wavelength about 1.77 A
wavelength: 1.77

## C8 uniform delay parameters
ss: 155
tmin: -84
tmax: 550
seed: 123

## Options
remove_negative_pixels: false
make_drl_mask: true
use_drl_mask: true
generate_hkl_avg: true
